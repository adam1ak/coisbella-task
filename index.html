<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zadanie rekrutacyjne dla Cosibella">
    <title>Katalog produktów</title>
</head>

<body>
    <!-- Modal -->
    <div id="product-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title"
        aria-hidden="true">
    </div>

    <header>
        <h1>Katalog produktów</h1>
        <p id="products-count">Znaleziono 00 produktów</p>

        <div>divider</div>
    </header>

    <main>
        <!-- filter section -->
        <section class="filters-section" aria-label="Filtry produktow">
            <div class="filter-group">
                <label for="category-select">Kategoria</label>
                <select id="category-select">
                    <option value="">Wszystkie kategorie</option>
                    <!-- js dynamic options -->
                </select>
            </div>

            <div class="filter-group">
                <label for="price-min">Cena (PLN)</label>
                <input type="number" id="price-min" min="0" placeholder="od">

                <label for="price-max" class="sr-only">Cena do (PLN)</label>
                <input type="number" id="price-max" min="0" placeholder="do">
            </div>

            <button id="reset-btn">
                Resetuj filtry
            </button>
        </section>

        <!-- status container -->
        <section id="status-container" aria-live="polite">
            <div id="loader" class="hidden">Wczytywanie produktow</div>
            <div id="error-message" class="hidden">Wystapil blad podczas ładowania danych.</div>
            <div id="no-results" class="hidden">Nie moglismy znaleźć produktów, których szukasz</div>
        </section>

        <!-- Lista produktow -->
        <section class="products-section" aria-label="Lista produktow">
            <div id="products-container"></div>
        </section>
    </main>

    <footer>
        <nav class="pagination-nav" aria-label="Nawigacja stronami">
            <div id="pagination-container"></div>
        </nav>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
